name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -o dist/xray-installer \
            ./cmd/xray-installer
          tar -C dist -czf "dist/xray-installer_linux_${GOARCH}.tar.gz" xray-installer
          rm -f dist/xray-installer

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.tar.gz > checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_PAYLOAD="$(python - <<'PY'
          import json, os
          print(json.dumps({
              "tag_name": os.environ["GITHUB_REF_NAME"],
              "name": os.environ["GITHUB_REF_NAME"],
              "generate_release_notes": True,
          }))
          PY
          )"

          RESPONSE_FILE="$(mktemp)"
          STATUS_CODE="$(
            curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
              -d "${RELEASE_PAYLOAD}"
          )"

          case "${STATUS_CODE}" in
            201)
              ;;
            422)
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
                -o "${RESPONSE_FILE}"
              ;;
            *)
              echo "Create release failed with status ${STATUS_CODE}" >&2
              cat "${RESPONSE_FILE}" >&2
              exit 1
              ;;
          esac

          UPLOAD_URL="$(
            python - "${RESPONSE_FILE}" <<'PY'
          import json, sys
          with open(sys.argv[1], 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          print(data["upload_url"].split("{", 1)[0])
          PY
          )"

          for file in dist/*; do
            name="$(basename "${file}")"
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" \
              "${UPLOAD_URL}?name=${name}" >/dev/null
          done
